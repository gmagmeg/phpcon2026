name: Benchmark re-measure (native amd64)

# 特定のベンチ 1〜数本だけを素早く再計測する手動ワークフロー。
# コードを直したあと「その 1 本だけ」を JIT OFF / function / tracing で取り直し、
# スライドに貼れる形（-- JIT xxx -- + | ... 表）で Step Summary に出す。
#
# benchmark-amd64.yml と同じ x86_64（GitHub-hosted ubuntu）・同じイメージ・同じ 3 モード。
# 既定は MoneyBench（手続き / ミュータブル / イミュータブル）。
# 使い方: Actions タブ → このワークフロー → Run workflow → bench を指定。

on:
  workflow_dispatch:
    inputs:
      bench:
        description: "再計測するベンチ（スペース区切りで複数可）"
        type: string
        default: "benchmarks/MoneyBench.php"
      time_unit:
        description: "時間単位"
        type: choice
        options:
          - microseconds
          - milliseconds
        default: microseconds

concurrency:
  group: benchmark-remeasure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: re-measure
    runs-on: ubuntu-latest        # GitHub-hosted ランナーはネイティブ x86_64
    defaults:
      run:
        working-directory: laravel  # compose.yaml / Dockerfile はここ
    steps:
      - uses: actions/checkout@v4

      - name: CPU / arch info
        run: |
          echo "arch: $(uname -m)"
          lscpu | grep -E 'Architecture|Model name|^CPU\(s\)|MHz' || true

      - name: Build app image (native amd64)
        run: docker compose build app

      - name: Run benchmarks (JIT OFF / function / tracing)
        env:
          IMG: performance-php-app          # compose がビルドするイメージ名
          TU: ${{ inputs.time_unit }}
          BENCHES: ${{ inputs.bench }}
        run: |
          set -euo pipefail
          echo "再計測対象: $BENCHES"

          # イメージには .env を焼き込んでいない（.dockerignore 済み）ため、
          # エントリポイントが起動時に .env を生成＆composer は焼き込み済み。
          # volume はマウントしない（マウントすると CI 上に vendor が無く壊れる）。
          run_mode () {   # $1=label  $2..=phpbench の追加フラグ
            local label="$1"; shift
            echo "-- JIT ${label} --" | tee -a "$GITHUB_STEP_SUMMARY"
            docker run --rm "$IMG" \
              php vendor/bin/phpbench run "$BENCH" --report=aggregate --time-unit="$TU" "$@" 2>&1 \
              | grep -E '^\| ' | tee -a "$GITHUB_STEP_SUMMARY" || true
          }

          {
            echo "## Re-measure — native amd64 ($(uname -m))"
            echo ""
            echo "CPU: \`$(lscpu | awk -F: '/Model name/{print $2; exit}' | xargs)\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          for BENCH in $BENCHES; do
            name=$(basename "$BENCH" .php)
            {
              echo "### ${name}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            run_mode "OFF"      --php-config='opcache.jit_buffer_size: 0'
            run_mode "function" --php-config='opcache.jit_buffer_size: 64M' --php-config='opcache.jit: function'
            run_mode "tracing"  --php-config='opcache.jit_buffer_size: 64M' --php-config='opcache.jit: tracing'

            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done
