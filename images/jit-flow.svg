<svg xmlns="http://www.w3.org/2000/svg" viewBox="85 0 1280 820" width="1280" height="820" role="img"
	aria-label="JIT が効くところ：OPcache 上の OPCODE を JIT が機械語化し、Zend VM を介さず CPU が直接機械語を実行する">
	<defs>
		<marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
			<path d="M0,0 L7,3 L0,6 Z" fill="#6b7a90"/>
		</marker>
		<marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
			<path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/>
		</marker>
		<marker id="ahj" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
			<path d="M0,0 L7,3 L0,6 Z" fill="#d97706"/>
		</marker>
	</defs>
	<rect x="85" y="0" width="1280" height="820" fill="#ffffff"/>
	<g font-family="'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', Meiryo, sans-serif" text-anchor="middle">

		<!-- 2回目以降スキップ枠（コンパイル〜OPCODE 生成を囲む） -->
		<rect x="92" y="189" width="420" height="409" rx="24" fill="#15803d" fill-opacity="0.05" stroke="#15803d" stroke-width="3" stroke-dasharray="10 7"/>

		<!-- 縦フロー -->
		<rect x="120" y="20" width="360" height="110" rx="16" fill="#eef3fb" stroke="#134aa9" stroke-width="2.5"/>
		<text x="300" y="89" font-size="38" font-weight="700" fill="#1a2f4a">PHP ソース</text>

		<rect x="120" y="240" width="360" height="110" rx="16" fill="#fdecec" stroke="#b91c1c" stroke-width="2.5"/>
		<text x="300" y="309" font-size="38" font-weight="700" fill="#b91c1c">コンパイル</text>

		<rect x="120" y="460" width="360" height="110" rx="16" fill="#eef3fb" stroke="#134aa9" stroke-width="2.5"/>
		<text x="300" y="529" font-size="38" font-weight="700" fill="#1a2f4a">OPCODE 生成</text>

		<rect x="120" y="680" width="360" height="110" rx="16" fill="#eef3fb" stroke="#134aa9" stroke-width="2.5"/>
		<text x="300" y="749" font-size="38" font-weight="700" fill="#1a2f4a">Zend VM で実行</text>

		<line x1="300" y1="132" x2="300" y2="236" stroke="#6b7a90" stroke-width="3" marker-end="url(#ah)"/>
		<line x1="300" y1="352" x2="300" y2="456" stroke="#6b7a90" stroke-width="3" marker-end="url(#ah)"/>
		<line x1="300" y1="572" x2="300" y2="676" stroke="#6b7a90" stroke-width="3" marker-end="url(#ah)"/>

		<!-- OPcache キャッシュ -->
		<rect x="700" y="460" width="300" height="110" rx="16" fill="#e7f3ec" stroke="#15803d" stroke-width="2.5"/>
		<text x="850" y="506" font-size="40" font-weight="700" fill="#15803d">OPcache</text>
		<text x="850" y="546" font-size="30" fill="#15803d">メモリにキャッシュ</text>

		<!-- ① 保存：OPCODE 生成 → キャッシュ -->
		<line x1="480" y1="515" x2="696" y2="515" stroke="#6b7a90" stroke-width="3" marker-end="url(#ah)"/>
		<rect x="526" y="465" width="124" height="44" rx="8" fill="#ffffff"/>
		<text x="588" y="497" font-size="36" fill="#5b6b80">① 保存</text>

		<!-- ② 2回目以降：キャッシュ → Zend VM で実行 -->
		<path d="M850,570 C 850,690 650,740 486,740" fill="none" stroke="#15803d" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#ahg)"/>

		<!-- スキップ枠キャプション -->
		<rect x="96" y="160" width="412" height="58" rx="12" fill="#ffffff"/>
		<text x="302" y="203" font-size="42" font-weight="700" fill="#15803d">2回目以降はスキップ</text>

		<!-- ===== JIT 経路（新規） ===== -->
		<!-- JIT 経路をうっすら囲むアンバー枠 -->
		<rect x="1030" y="430" width="320" height="380" rx="24" fill="#d97706" fill-opacity="0.05" stroke="#d97706" stroke-width="3" stroke-dasharray="10 7"/>

		<!-- JIT 機械語化ボックス -->
		<rect x="1050" y="460" width="280" height="110" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
		<text x="1190" y="508" font-size="40" font-weight="700" fill="#92400e">JIT</text>
		<text x="1190" y="548" font-size="26" fill="#92400e">OPCODE → 機械語</text>

		<!-- OPcache → JIT -->
		<line x1="1000" y1="515" x2="1046" y2="515" stroke="#d97706" stroke-width="3" marker-end="url(#ahj)"/>

		<!-- ネイティブ機械語で実行ボックス -->
		<rect x="1050" y="680" width="280" height="110" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
		<text x="1190" y="725" font-size="32" font-weight="700" fill="#92400e">CPU が直接</text>
		<text x="1190" y="765" font-size="32" font-weight="700" fill="#92400e">機械語を実行</text>

		<!-- JIT → 機械語実行 -->
		<line x1="1190" y1="572" x2="1190" y2="676" stroke="#d97706" stroke-width="3" marker-end="url(#ahj)"/>

		<!-- JIT 枠キャプション -->
		<rect x="1066" y="402" width="248" height="50" rx="12" fill="#ffffff"/>
		<text x="1190" y="439" font-size="34" font-weight="700" fill="#d97706">JIT 経路</text>

	</g>
</svg>
