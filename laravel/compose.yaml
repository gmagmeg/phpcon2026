name: performance-php

services:
  # PHP 8.5 (PHP-FPM) — Laravel 実行本体
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: performance-php-app
    env_file:
      - path: .env
        required: false
    environment:
      # ---- OPcache / JIT 検証用スイッチ（リビルド不要で切替）----
      # 例: OPCACHE_ENABLE=0 docker compose up -d でOPcacheを無効化して比較
      OPCACHE_ENABLE: "${OPCACHE_ENABLE:-1}"
      OPCACHE_ENABLE_CLI: "${OPCACHE_ENABLE_CLI:-1}"
      OPCACHE_VALIDATE_TIMESTAMPS: "${OPCACHE_VALIDATE_TIMESTAMPS:-1}"
      OPCACHE_JIT: "${OPCACHE_JIT:-tracing}"
      OPCACHE_JIT_BUFFER_SIZE: "${OPCACHE_JIT_BUFFER_SIZE:-128M}"
      OPCACHE_MEMORY: "${OPCACHE_MEMORY:-256}"
    volumes:
      # ソースをマウントしてコード変更を即反映（検証サイクルを速く）
      - ./:/app
    restart: unless-stopped

  # nginx — Webサーバー
  web:
    image: nginx:1.27-bookworm
    container_name: performance-php-web
    ports:
      # Host port shifted to 8001 to avoid conflict with reveal.js (../) on 8000.
      - "${APP_PORT:-8001}:8000"
    volumes:
      - ./:/app:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  # ドキュメント閲覧用の軽量静的サーバー（HTMLホスティング専用）
  # nginx は使わず Caddy の file-server（単一バイナリ・設定ファイル不要）。
  docs:
    image: caddy:2-alpine
    container_name: performance-php-docs
    command: caddy file-server --root /docs --listen :${PORT:-${DOCS_PORT:-9001}} --browse
    ports:
      - "${PORT:-${DOCS_PORT:-9001}}:${PORT:-${DOCS_PORT:-9001}}"
    volumes:
      - ./public/docs:/docs:ro
    restart: unless-stopped
